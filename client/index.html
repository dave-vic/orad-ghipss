<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/ghipss-logo.svg" />
    <title>ORAD — Ghipps Operations Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-bg:            #F7F8FA;
        --color-surface:       #FFFFFF;
        --color-border:        #E5E7EB;
        --color-border-strong: #D1D5DB;

        --color-text-primary:  #111827;
        --color-text-body:     #374151;
        --color-text-muted:    #6B7280;
        --color-text-subtle:   #9CA3AF;

        --color-accent:        #306196;
        --color-accent-lt:     #E8F0F8;
        --color-accent-hover:  #245078;

        --color-green:         #059669;
        --color-green-lt:      #D1FAE5;
        --color-red:           #DC2626;
        --color-red-lt:        #FEE2E2;
        --color-amber:         #D97706;
        --color-amber-lt:      #FEF3C7;
        --color-blue:          #2563EB;
        --color-blue-lt:       #DBEAFE;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #F7F8FA; color: #374151; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      .fade-in { animation: fadeIn 0.2s ease; }
      .toast-in { animation: toastIn 0.2s ease; }
      input, button, select, textarea { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
